<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Center Runner - Test Main Function</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="runner-shell">
      <h1>Center Runner - Test Main Function</h1>

      <aside class="domain-update-notice" aria-label="Domain update reminder">
        <div>
          <strong>Cập nhật domain trước khi chạy test</strong>
          <p>Vui lòng kiểm tra và cập nhật domain mới nhất trong Google Sheet.</p>
        </div>
        <a
          class="domain-update-button"
          href="https://docs.google.com/spreadsheets/d/10ltY4EhWpcjpYtmhikGA7eDV0z0Ny0kG80flkC-bQ3U/edit?gid=0#gid=0"
          target="_blank"
          rel="noopener noreferrer"
        >Cập nhật domain</a>
      </aside>

      <section class="domain-panel" aria-label="Domain command form">
        <form id="runner-form" class="domain-form">
          <label class="field">
            <span>Tool Name</span>
            <select id="tool-name" name="tool" required>
              <option value="aliveDaily">Alive Daily</option>
              <option value="checkAccess">Check Access</option>
            </select>
          </label>

          <label class="field">
            <span>Group Name</span>
            <select id="group-name" name="group" required></select>
          </label>

          <label class="field">
            <span>Brand Name</span>
            <select id="brand-name" name="brand" required></select>
          </label>

          <button class="start-button" type="submit">Start</button>
        </form>

        <div class="job-row" aria-live="polite">
          <span>Job ID: <strong id="job-id">-</strong></span>
          <span>GROUP: <strong id="group-label">-</strong></span>
          <span>BRAND: <strong id="brand-label">-</strong></span>
          <span>Status: <strong id="status-label">IDLE</strong></span>
          <span class="alive-note" id="alive-note"></span>
        </div>

        <div class="queue-panel" aria-label="Job queue">
          <table class="job-table">
            <thead>
              <tr>
                <th>Job ID</th>
                <th>Group</th>
                <th>Brand</th>
                <th>Status</th>
                <th>Exit</th>
                <th>Created</th>
                <th>Report</th>
              </tr>
            </thead>
            <tbody id="job-list">
              <tr>
                <td colspan="7">No jobs yet.</td>
              </tr>
            </tbody>
          </table>
          <div id="job-pagination" class="job-pagination" aria-label="Job list pagination"></div>
        </div>
      </section>

      <section class="report-panel" aria-label="Report viewer">
        <iframe id="report-frame" title="Mono report preview"></iframe>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
